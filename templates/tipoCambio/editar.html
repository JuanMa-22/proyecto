<div id="modalEditar{{ item.id_tipoCambio }}" class="modal">
    <div class="modal-content">
        <span class="close" onclick="cerrarModal('modalEditar{{ item.id_tipoCambio }}')">&times;</span>
        <h3 class="card-title" style="margin-bottom: 20px;">Editar Tipo de Cambio</h3>
        
        <form action="{% url 'tipoCambio:editar' item.id_tipoCambio %}" method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Valor (Bs)</label>
                <input type="number" name="valor" value="{{ item.valor }}" required step="0.01">
            </div>
            <div class="form-group">
                <label>Fecha</label>
                <input type="date" name="fecha" value="{{ item.fecha|date:'Y-m-d' }}" required>
            </div>
            
            <div style="text-align: right; margin-top: 25px;">
                <button type="button" class="btn-secondary" onclick="cerrarModal('modalEditar{{ item.id_tipoCambio }}')">Cancelar</button>
                <button type="submit" class="btn-primary">Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>
