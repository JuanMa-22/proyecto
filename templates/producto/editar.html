<div id="modalEditarProducto{{ producto.id_producto }}" class="modal">
    <div class="modal-content">
        <span class="close" onclick="cerrarModal('modalEditarProducto{{ producto.id_producto }}')">&times;</span>
        <h3 class="card-title" style="margin-bottom: 20px;">Editar Producto</h3>
        
        <form action="{% url 'producto:editar' producto.id_producto %}" method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" name="nombre" value="{{ producto.nombre }}" required>
            </div>
            <div class="form-group">
                <label>Descripción</label>
                <textarea name="descripcion" rows="3">{{ producto.descripcion }}</textarea>
            </div>
            <div class="form-group" style="display: flex; gap: 15px;">
                <div style="flex: 1;">
                    <label>Precio de Venta (USD)</label>
                    <input type="number" step="0.01" name="precio" value="{{ producto.precio_usd|stringformat:'f' }}" required>
                </div>
                <div style="flex: 1;">
                    <label>Stock Actual</label>
                    <input type="number" name="stock" value="{{ producto.stock }}" readonly style="background-color: var(--border-color); cursor: not-allowed;" title="El stock solo puede ser modificado mediante compras o ventas.">
                </div>
            </div>
            <div class="form-group">
                <label>Categoría</label>
                <select name="categoria" id="editarProductoCategoria{{ producto.id_producto }}" required>
                    {% for categoria in categorias %}
                        <option value="{{ categoria.id_categoria }}" {% if producto.categoria == categoria.id_categoria %}selected{% endif %}>{{ categoria.nombre }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Marca</label>
                <select name="marca" id="editarProductoMarca{{ producto.id_producto }}" required>
                    {% for marca in marcas %}
                        <option value="{{ marca.id_marca }}" {% if producto.marca == marca.id_marca %}selected{% endif %}>{{ marca.nombre }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Imagen del Producto</label>
                
                <div style="text-align: center; margin-bottom: 12px; background: #F8FAFC; border: 1.5px dashed var(--border-color); padding: 10px; border-radius: 8px;">
                    <small style="display: block; color: var(--text-secondary); margin-bottom: 6px; font-weight: 600;">Vista Previa de la Imagen:</small>
                    
                    {% if producto.imagen %}
                        <img id="imgEditarPreview{{ producto.id_producto }}" src="{{ producto.imagen.url }}" alt="Imagen del producto" style="width: 100px; height: 100px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border-color); display: inline-block; margin: 0 auto;">
                    {% else %}
                        <div id="imgEditarPlaceholder{{ producto.id_producto }}" style="width: 100px; height: 100px; background-color: var(--border-color); border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; margin: 0 auto;">
                            <i class='bx bx-image' style="color: var(--text-secondary); font-size: 32px;"></i>
                        </div>
                        <img id="imgEditarPreview{{ producto.id_producto }}" src="" alt="Vista previa" style="width: 100px; height: 100px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border-color); display: none; margin: 0 auto;">
                    {% endif %}
                </div>

                <input type="file" name="imagen" accept="image/*" onchange="previewImageEdit(this, '{{ producto.id_producto }}')">
                <p style="color: var(--text-secondary); font-size: 11px; margin-top: 6px; margin-bottom: 0; line-height: 1.4;">
                    <i class='bx bx-info-circle' style="vertical-align: middle;"></i> Dejar en blanco para mantener la imagen actual.
                </p>
            </div>
            
            <div style="text-align: right; margin-top: 25px;">
                <button type="button" class="btn-secondary" onclick="cerrarModal('modalEditarProducto{{ producto.id_producto }}')">Cancelar</button>
                <button type="submit" class="btn-primary">Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>
