<div id="modalCrearProducto" class="modal">
    <div class="modal-content">
        <span class="close" onclick="cerrarModal('modalCrearProducto')">&times;</span>
        <h3 class="card-title" style="margin-bottom: 20px;">Crear Producto</h3>
        
        <form action="{% url 'producto:crear' %}" method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" name="nombre" required>
            </div>
            <div class="form-group">
                <label>Descripción</label>
                <textarea name="descripcion" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>Categoría</label>
                <select name="categoria" id="crearProductoCategoria" required>
                    <option value="">Seleccione una categoría...</option>
                    {% for categoria in categorias %}
                        <option value="{{ categoria.id_categoria }}">{{ categoria.nombre }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Marca</label>
                <select name="marca" id="crearProductoMarca" required>
                    <option value="">Seleccione una marca...</option>
                    {% for marca in marcas %}
                        <option value="{{ marca.id_marca }}">{{ marca.nombre }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Imagen del Producto</label>
                <input type="file" name="imagen" id="imgCrearInput" accept="image/*" onchange="previewImage(this, 'imgCrearPreviewContainer', 'imgCrearPreview')">
                <div id="imgCrearPreviewContainer" style="display: none; margin-top: 12px; text-align: center; background: #F8FAFC; border: 1.5px dashed var(--border-color); padding: 10px; border-radius: 8px;">
                    <small style="display: block; color: var(--text-secondary); margin-bottom: 6px; font-weight: 600;">Vista Previa de la Imagen Seleccionada:</small>
                    <img id="imgCrearPreview" src="" alt="Vista previa" style="width: 100px; height: 100px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border-color);">
                </div>
            </div>
            
            <div style="text-align: right; margin-top: 25px;">
                <button type="button" class="btn-secondary" onclick="cerrarModal('modalCrearProducto')">Cancelar</button>
                <button type="submit" class="btn-primary">Guardar Producto</button>
            </div>
        </form>
    </div>
</div>
