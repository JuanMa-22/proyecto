<div id="modalCrearCategoria" class="modal">
    <div class="modal-content">
        <span class="close" onclick="cerrarModal('modalCrearCategoria')">&times;</span>
        <h3 class="card-title" style="margin-bottom: 20px;">Crear Categoría</h3>
        
        <form action="{% url 'categoria:crear' %}" method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" name="nombre" required>
            </div>

            <div style="text-align: right; margin-top: 25px;">
                <button type="button" class="btn-secondary" onclick="cerrarModal('modalCrearCategoria')">Cancelar</button>
                <button type="submit" class="btn-primary">Guardar</button>
            </div>
        </form>
    </div>
</div>
